<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 34px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#111827; }
      .subtitle { font: 600 18px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#374151; }
      .box-title { font: 700 30px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#111827; text-anchor:middle; }
      .box-text { font: 500 16px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#1f2937; }
      .gate-title { font: 700 24px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#111827; text-anchor:middle; }
      .gate-text { font: 500 16px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#1f2937; }
      .note { font: 700 17px 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; fill:#b91c1c; }
    </style>
  </defs>

  <text x="40" y="50" class="title">프로젝트 아키텍처</text>
  <text x="1280" y="50" class="subtitle">2026.02 | 개인 프로젝트</text>

  <rect x="20" y="70" width="1460" height="610" rx="36" fill="#f8fbff" stroke="#3b82f6" stroke-width="4"/>

  <rect x="90" y="110" width="240" height="130" rx="24" fill="#f3f4f6" stroke="#334155" stroke-width="2.5"/>
  <text x="210" y="155" class="box-title">RAW</text>
  <text x="110" y="185" class="box-text">- 원천 이벤트/속성 적재</text>

  <rect x="360" y="110" width="240" height="130" rx="24" fill="#f3f4f6" stroke="#334155" stroke-width="2.5"/>
  <text x="480" y="155" class="box-title">STAGING</text>
  <text x="380" y="185" class="box-text">- 타입/시간 표준화</text>

  <rect x="630" y="110" width="240" height="130" rx="24" fill="#f3f4f6" stroke="#334155" stroke-width="2.5"/>
  <text x="750" y="155" class="box-title">DATAMART</text>
  <text x="650" y="185" class="box-text">- 세션화 (fact/session)</text>

  <rect x="900" y="110" width="240" height="130" rx="24" fill="#f3f4f6" stroke="#334155" stroke-width="2.5"/>
  <text x="1020" y="155" class="box-title">KPI</text>
  <text x="920" y="185" class="box-text">- Funnel·Cohort·CRM</text>

  <rect x="1170" y="110" width="240" height="130" rx="24" fill="#f3f4f6" stroke="#334155" stroke-width="2.5"/>
  <text x="1290" y="155" class="box-title">EXPORT</text>
  <text x="1190" y="185" class="box-text">- CSV 3종 + Summary</text>

  <line x1="330" y1="175" x2="360" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="175" x2="630" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="870" y1="175" x2="900" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1140" y1="175" x2="1170" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="300" width="1360" height="340" rx="20" fill="#ffffff" stroke="#9ca3af" stroke-dasharray="10 8" stroke-width="2.5"/>
  <text x="90" y="335" class="subtitle">QA GATES (키워드 중심)</text>

  <rect x="100" y="360" width="400" height="220" rx="20" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="300" y="400" class="gate-title">Pre-RAW (3)</text>
  <text x="125" y="435" class="gate-text">- Domain (event_type)</text>
  <text x="125" y="465" class="gate-text">- Timestamp (NULL / ≤0)</text>
  <text x="125" y="495" class="gate-text">- Integrity (transaction_id 등)</text>

  <rect x="550" y="360" width="400" height="220" rx="20" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="750" y="400" class="gate-title">Pre-KPI (3)</text>
  <text x="575" y="435" class="gate-text">- Event Count Recon</text>
  <text x="575" y="465" class="gate-text">- Session Count Recon</text>
  <text x="575" y="495" class="gate-text">- Null Checks (event_ts/session_id 등)</text>

  <rect x="1000" y="360" width="400" height="220" rx="20" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="1200" y="400" class="gate-title">Post-KPI (2)</text>
  <text x="1025" y="435" class="gate-text">- KPI Sanity (음수 / CVR 0~1)</text>
  <text x="1025" y="465" class="gate-text">- Recon + Monotonicity</text>

  <line x1="500" y1="470" x2="550" y2="470" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="950" y1="470" x2="1000" y2="470" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="1030" y="620" class="note">FAIL row 발생 시 즉시 실패 처리 → Export 차단</text>
</svg>
