site_name: DA-AIRFLOW_RETAILROCKET
site_description: Airflow 기반 RetailRocket 분석 파이프라인 문서
site_url: https://geonyul2.github.io/DA-AIRFLOW_RETAILROCKET/
repo_url: https://github.com/GeonYul2/DA-AIRFLOW_RETAILROCKET
edit_uri: ""
docs_dir: docs

theme:
  name: material
  language: ko
  features:
    - content.code.copy

nav:
  - Portfolio: index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false
      toc_depth: "2"
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
